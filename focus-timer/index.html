<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visual Timer</title>
  <meta name="description" content="Draggable visual timer with optional seconds, auto-start, and end chime.">
  <style>
    :root{
      --bg:#0b1020; --ink:#e2e8f0; --muted:#94a3b8;
      --accent:#7dd3fc; --accent-2:#38bdf8; --card:#11182f;
      --line:#233055; --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;}
    .wrap{max-width:960px;margin:0 auto;padding:28px clamp(16px,5vw,32px) 48px;}
    header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
    .brand{font-weight:800;letter-spacing:.2px;font-size:22px;display:flex;align-items:center;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);}
    .dial-wrap{display:grid;justify-items:center;gap:12px;margin-top:6px;}
    .dial{width:340px;height:340px;border-radius:50%;
      background:conic-gradient(from 0deg,
        var(--accent) 0deg,
        var(--accent) var(--progress,180deg),
        rgba(255,255,255,.08) var(--progress,180deg),
        rgba(255,255,255,.08) 360deg);
      border:1px solid var(--line);position:relative;box-shadow:0 12px 40px rgba(0,0,0,.35);touch-action:none;pointer-events:none;}
    .dial::after{content:"";position:absolute;inset:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.06);}
    .knob{pointer-events:auto;cursor:pointer;position:absolute;width:16px;height:16px;background:var(--accent-2);border-radius:50%;border:2px solid #0a0f1f;top:50%;left:50%;transform:translate(-50%,-50%) rotate(var(--arm-rot,-90deg)) translate(142px) rotate(calc(-1*var(--arm-rot,-90deg)));box-shadow:0 0 0 10px rgba(56,189,248,.15),0 8px 24px rgba(0,0,0,.35);}
    .center{position:absolute;inset:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);}
    .time{font-size:56px;font-variant-numeric:tabular-nums;color:var(--ink);margin:0;line-height:1;}
    .toggles{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px;color:var(--muted);}
    .toggle{display:flex;align-items:center;gap:6px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);}
    .control{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);}
    .control select{background:#0b1020;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;}
    .control input[type="range"]{width:128px;accent-color:var(--accent-2);}
    .volume-value{min-width:42px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);}
    .chip-btn{border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:700;}
    .footer{margin-top:14px;color:var(--muted);font-size:13px;text-align:center}
    @media(max-width:520px){.dial{width:280px;height:280px}.center{inset:44px}.time{font-size:48px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">⏱️ Visual Timer</div>
      <div class="muted">Auto-start • Drag to set</div>
    </header>

    <section class="card">
      <div class="dial-wrap">
        <div class="dial" id="dial" aria-label="Timer dial">
          <div class="knob" id="knob"></div>
          <div class="center">
            <p class="time" id="timeDisplay">30:00</p>
            <div class="muted" id="status">Running</div>
            <div class="muted" style="margin-top:6px;font-size:14px" id="exerciseSlot"></div>
          </div>
        </div>
      </div>
      <div class="toggles">
        <label class="toggle"><input type="checkbox" id="showSeconds" checked> Show seconds</label>
        <label class="toggle"><input type="checkbox" id="soundOn" checked> Sound on finish</label>
        <label class="control">Sound
          <select id="soundSelect">
            <option value="chime">Chime</option>
            <option value="chicken">Chicken</option>
            <option value="oink">Oink</option>
            <option value="gong">Gong</option>
          </select>
        </label>
        <label class="control">Volume
          <input type="range" id="volumeSlider" min="0" max="200" value="120">
          <span class="volume-value" id="volumeValue">120%</span>
        </label>
        <label class="toggle"><input type="checkbox" id="exerciseToggle" checked> Random exercise</label>
        <button class="chip-btn" id="restart">Restart 30:00</button>
        <button class="chip-btn" id="restart5">Restart 00:05</button>
        <button class="chip-btn" id="exerciseBtn">Random exercise</button>
      </div>
    </section>
    <div class="footer" id="ticker"></div>
  </div>

  <audio id="chime" preload="auto" src="data:audio/wav;base64,UklGRsQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YYQAAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA="></audio>

  <script>
    const dial = document.getElementById('dial');
    const knob = document.getElementById('knob');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusEl = document.getElementById('status');
    const showSeconds = document.getElementById('showSeconds');
    const soundOn = document.getElementById('soundOn');
    const soundSelect = document.getElementById('soundSelect');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const exerciseToggle = document.getElementById('exerciseToggle');
    const restartBtn = document.getElementById('restart');
    const restart5Btn = document.getElementById('restart5');
    const exerciseBtn = document.getElementById('exerciseBtn');
    const ticker = document.getElementById('ticker');
    const chime = document.getElementById('chime');
    let audioCtx = null;
    let pendingChime = false;
    let audioPrimed = false;
    let timerWorker = null;
    let completionHandled = false;
    let lastPreviewAt = 0;

    const State = { IDLE:'IDLE', RUN:'RUN' };
    let state = {
      focusMs: 30 * 60_000,
      remainingMs: 30 * 60_000,
      runState: State.RUN,
      endTs: null,
      lastWhole: null
    };
    const EXERCISES = [
      // Cardio / blood-flow reset (standing)
      "30 jumping jacks",
      "30 leg bouncing jacks",
      "30 air punches marching",
      "20 bouncing overhead punches",
      "20 standing cross punches",
      "20 side-to-side punches",
      "20 boxer shuffles",
      "20 running man shuffles",
      "20 ghost jump rope",
      "20 fast feet",
      "20 high knees",
      "20 butt kicks",
      "20 power marches",
      "20 step jacks",
      "20 lateral steps",
      "20 skater taps",
      "20 toe taps",
      "20 standing knee drives",
      "20 alternating side reaches",
      "10 jump squats",
      "10 front kicks",
      "10 side kicks",
      "30s freestyle dancing",
      // Light strength (standing / wall / table)
      "10 table push-ups",
      "10 squats",
      "20 squat pulses",
      "10 reverse lunges",
      "10 lunges (each leg 5)",
      "15 calf raises",
      "10 table dips",
      "20 wall push-offs",
      "30s wall sit",
      // Core (standing / table)
      "10 knee-to-elbows",
      "10 side bends",
      "20 standing twists",
      "30s table plank",
      "20 table mountain climbers",
      // Mobility / posture (standing / wall / chair)
      "20 arm rotations",
      "10 standing cat-cows",
      "10 leg swings (each leg 5)",
      "10 side leg swings (each leg 5)",
      "20 chest openers",
      "10 shoulder rolls + neck circles",
      "8 wall slides",
      "8 standing thoracic rotations",
      "30s standing forward fold",
      "20s standing hip-flexor stretch (each side)",
      "20s standing quad stretch (each side)",
      "30s deep squat hold",
      "seated figure-4 stretch (each side)"
    ];

    const clamp = (v,min,max)=>Math.min(Math.max(v,min),max);
    const volumeGain = () => Number(volumeSlider.value) / 100;

    function format(ms, withSeconds){
      const total = Math.max(0, Math.floor(ms/1000));
      const m = Math.floor(total/60).toString().padStart(2,'0');
      const s = (total%60).toString().padStart(2,'0');
      return withSeconds ? `${m}:${s}` : `${m}`;
    }

    let audioUnlocked = false;
    function ensureAudioUnlocked(){
      if(audioUnlocked) return;
      try{
        const AC = window.AudioContext || window.webkitAudioContext;
        if(AC && !audioCtx){
          audioCtx = new AC();
        }
        if(audioCtx && audioCtx.state === 'suspended'){
          audioCtx.resume().catch(()=>{});
        }
        if(audioCtx){
          const silent = audioCtx.createBufferSource();
          const gain = audioCtx.createGain();
          gain.gain.value = 0;
          silent.connect(gain).connect(audioCtx.destination);
          silent.start(0);
          audioUnlocked = true;
        }
        // try a silent play on the audio element as a fallback path
        chime.volume = 0;
        const p = chime.play();
        if(p?.then) p.then(()=>{chime.pause(); chime.currentTime = 0; audioUnlocked = true;}).catch(()=>{});
        else { chime.pause(); chime.currentTime = 0; audioUnlocked = true; }
      }catch(_){}
    }

    function playOsc(freq, start, duration, peak, type='sine'){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak), start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + duration + 0.03);
    }

    function playCluck(start, peak){
      playOsc(940, start, 0.08, peak * 0.9, 'square');
      playOsc(1220, start + 0.08, 0.07, peak, 'square');
      playOsc(760, start + 0.16, 0.09, peak * 0.75, 'sawtooth');
    }

    function playOink(start, peak){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, start);
      osc.frequency.exponentialRampToValueAtTime(95, start + 0.22);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak), start + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.36);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    }

    function playGong(start, peak){
      [196, 247, 330].forEach((freq, i) => {
        playOsc(freq, start + i * 0.015, 1.7 + i * 0.25, peak * (0.7 - i * 0.12), i ? 'triangle' : 'sine');
      });
    }

    function playSelectedSound(force=false){
      if(!soundOn.checked) return;
      ensureAudioUnlocked();
      const AC = window.AudioContext || window.webkitAudioContext;
      const ACctor = AC;
      const playSound = () => {
        try{
          const ctx = audioCtx;
          const now = ctx.currentTime;
          const peak = clamp(0.38 * volumeGain(), 0.0001, 1.2);
          const sound = soundSelect.value;
          if(sound === 'chicken'){
            playCluck(now, peak);
          }else if(sound === 'oink'){
            playOink(now, peak);
          }else if(sound === 'gong'){
            playGong(now, peak);
          }else{
            playOsc(880, now, force ? 0.28 : 0.5, peak, 'sine');
            playOsc(1320, now + 0.12, force ? 0.2 : 0.35, peak * 0.72, 'sine');
          }
          return true;
        }catch(_){
          return false;
        }
      };

      if(ACctor){
        if(!audioCtx) audioCtx = new ACctor();
        const ctx = audioCtx;
        const trySound = () => {
          if(!playSound()) queuePendingChime();
        };
        if(ctx.state === 'suspended'){
          ctx.resume().then(trySound).catch(queuePendingChime);
        }else{
          trySound();
        }
        return;
      }
      try{
        chime.currentTime = 0;
        chime.volume = clamp(volumeGain(), 0, 1);
        chime.play().catch(() => queuePendingChime());
      }catch(_){
        queuePendingChime();
      }
    }

    function queuePendingChime(){
      if(pendingChime) return;
      pendingChime = true;
      const fire = () => {
        pendingChime = false;
        window.removeEventListener('pointerdown', fire);
        window.removeEventListener('keydown', fire);
        window.removeEventListener('touchstart', fire);
        ensureAudioUnlocked();
        try{
          chime.currentTime = 0;
          chime.volume = clamp(volumeGain(), 0, 1);
          chime.play().catch(()=>{});
        }catch(_){}
      };
      window.addEventListener('pointerdown', fire, {once:true, passive:true});
      window.addEventListener('keydown', fire, {once:true});
      window.addEventListener('touchstart', fire, {once:true, passive:true});
    }

    function updateTitle(){
      document.title = state.runState === State.RUN ? `⏳ ${format(state.remainingMs,true)} • Timer` : 'Visual Timer';
    }

    function renderVisual(){
      const withSeconds = showSeconds.checked;
      timeDisplay.textContent = format(state.remainingMs, withSeconds);
      ticker.textContent = '';
      statusEl.textContent = state.runState === State.RUN ? 'Running' : 'Idle';
      const totalAngle = clamp(state.focusMs/1000/60,1,120)*6; // 6° per minute
      const progressAngle = Math.min(360, totalAngle * (state.remainingMs/state.focusMs));
      dial.style.setProperty('--progress', progressAngle+'deg');
      const angleDeg = progressAngle; // 0deg at top
      const angleRad = angleDeg * Math.PI / 180;
      const radius = dial.clientWidth/2 - 22;
      const x = radius * Math.sin(angleRad);  // CSS angles: 0deg at top, sin for x when starting at top
      const y = -radius * Math.cos(angleRad);
      knob.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
    }

    function render(){
      updateTitle();
      if(document.hidden) return;
      renderVisual();
    }

    function setFromAngle(clientX, clientY){
      const rect = dial.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const angle = Math.atan2(clientY-cy, clientX-cx) * 180/Math.PI; // -180..180
      let deg = (angle + 450) % 360; // 0 at top
      let mins = clamp(Math.round(deg/6), 1, 120);
      state.focusMs = mins * 60_000;
      state.remainingMs = state.focusMs;
      start();
    }

    let timeoutId = null;
    const clearTickHandles = () => { if(timeoutId){clearTimeout(timeoutId); timeoutId=null;} };

    function ensureTimerWorker(){
      if(timerWorker || !window.Worker || !window.Blob || !window.URL) return timerWorker;
      const code = `
        let intervalId = null;
        function stop(){
          if(intervalId){ clearInterval(intervalId); intervalId = null; }
        }
        self.onmessage = (event) => {
          if(event.data.type === 'start'){
            stop();
            const endTs = event.data.endTs;
            const tick = () => self.postMessage({type:'tick', remaining: endTs - Date.now()});
            tick();
            intervalId = setInterval(tick, 1000);
          }
          if(event.data.type === 'stop') stop();
        };
      `;
      const blob = new Blob([code], {type:'application/javascript'});
      timerWorker = new Worker(URL.createObjectURL(blob));
      timerWorker.onmessage = (event) => {
        if(event.data.type === 'tick') tick(event.data.remaining);
      };
      return timerWorker;
    }

    function scheduleTick(){
      clearTickHandles();
      if(state.runState !== State.RUN || state.endTs===null) return;
      const worker = ensureTimerWorker();
      if(worker){
        worker.postMessage({type:'start', endTs: state.endTs});
        return;
      }
      const remaining = Math.max(0, state.endTs - Date.now());
      const nextSecondDelay = Math.min(remaining, (remaining % 1000) || 1000);
      timeoutId = setTimeout(tick, nextSecondDelay + 20);
    }

    function stopTicking(){
      if(timerWorker) timerWorker.postMessage({type:'stop'});
      clearTickHandles();
    }

    function start(){
      state.runState = State.RUN;
      state.endTs = Date.now() + state.remainingMs;
      state.lastWhole = Math.floor(state.remainingMs/1000);
      completionHandled = false;
      ensureAudioUnlocked();
      exerciseSlot.textContent = '';
      render();
      scheduleTick();
    }

    function handleComplete(){
      if(completionHandled) return;
      completionHandled = true;
      stopTicking();
      playSelectedSound();
      if(exerciseToggle.checked){
        const pick = EXERCISES[Math.floor(Math.random()*EXERCISES.length)];
        exerciseSlot.textContent = `Try: ${pick}`;
      }else{
        exerciseSlot.textContent = '';
      }
      state.runState = State.IDLE;
      state.remainingMs = 0;
      state.endTs = null;
      render();
    }

    function tick(workerRemaining=null){
      if(state.runState !== State.RUN || state.endTs === null) return;
      const remaining = workerRemaining ?? state.endTs - Date.now();
      if(remaining <= 0){
        handleComplete();
        return;
      }
      state.remainingMs = remaining;
      const whole = Math.floor(remaining/1000);
      if(whole !== state.lastWhole){
        state.lastWhole = whole;
        render();
      }
      if(!timerWorker){
        scheduleTick();
      }
    }

    // drag only knob
    let dragging=false;
    knob.addEventListener('pointerdown',e=>{dragging=true;ensureAudioUnlocked();knob.setPointerCapture(e.pointerId);setFromAngle(e.clientX,e.clientY);});
    knob.addEventListener('pointermove',e=>{if(!dragging) return; setFromAngle(e.clientX,e.clientY);});
    knob.addEventListener('pointerup',e=>{dragging=false;knob.releasePointerCapture(e.pointerId);});
    knob.addEventListener('pointerleave',()=>dragging=false);

    showSeconds.addEventListener('change', render);
    soundOn.addEventListener('change', ()=>{});
    soundSelect.addEventListener('change', ()=>playSelectedSound(true));
    volumeSlider.addEventListener('input', ()=>{
      volumeValue.textContent = `${volumeSlider.value}%`;
      const now = Date.now();
      if(now - lastPreviewAt > 180){
        lastPreviewAt = now;
        playSelectedSound(true);
      }
    });
    restartBtn.addEventListener('click', ()=>{state.focusMs=30*60_000;state.remainingMs=state.focusMs;ensureAudioUnlocked();start();});
    restart5Btn.addEventListener('click', ()=>{state.focusMs=5_000;state.remainingMs=state.focusMs;ensureAudioUnlocked();start();});
    exerciseBtn.addEventListener('click', ()=> {
      if(exerciseToggle.checked){
        const pick = EXERCISES[Math.floor(Math.random()*EXERCISES.length)];
        exerciseSlot.textContent = `Try: ${pick}`;
      }
    });
    exerciseToggle.addEventListener('change', ()=>{
      if(!exerciseToggle.checked){
        exerciseSlot.textContent = '';
      }
    });

    // one-time global primer to unlock audio on any first user gesture
    function primeAudioOnce(){
      if(audioPrimed) return;
      audioPrimed = true;
      ensureAudioUnlocked();
      window.removeEventListener('pointerdown', primeAudioOnce);
      window.removeEventListener('touchstart', primeAudioOnce);
      window.removeEventListener('keydown', primeAudioOnce);
    }
    window.addEventListener('pointerdown', primeAudioOnce, {passive:true});
    window.addEventListener('touchstart', primeAudioOnce, {passive:true});
    window.addEventListener('keydown', primeAudioOnce);

    // tab visibility accuracy
    document.addEventListener('visibilitychange',()=>{
      if(state.runState!==State.RUN || state.endTs===null) return;
      const remaining = state.endTs - Date.now();
      if(remaining<=0){ handleComplete(); }
      else { state.remainingMs = remaining; render(); }
    });

    // init
    render();
    start();
  </script>
</body>
</html>
